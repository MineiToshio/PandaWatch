# Manga Watch - fuentes recomendadas
# source_class:
#   official      = editorial/tienda oficial o distribuidor oficial
#   trusted_media = medio especializado o medio de noticias confiable
#   retailer      = tienda/retailer útil para exclusivas, variantes o bonus
#   social        = red social/mirror; útil, pero menos estable para scraping
#
# Para un primer MVP puedes correr todo. Si hay mucho ruido:
#   python manga_watch.py --source-classes official,retailer
# o solo medios:
#   python manga_watch.py --source-classes trusted_media,social

sources:
