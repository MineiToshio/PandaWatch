                   # `--bootstrap-wiki mangavariant`.
    notes: |
      Base de datos global comunitaria de variants/ediciones especiales
      de manga (13 países, ~2700 entries). NO es retailer: las URLs son
      páginas-referencia ("este variant existe"), sin precio ni botón de
      compra. Cubre el caso central de PandaWatch: descubrir qué variantes
      especiales existen en el mundo.

      Ingestión:
        • Bulk inicial (una vez): `--bootstrap-wiki mangavariant` lee los
          3 variant-sitemaps (~2700 URLs) y carga todo.
        • Incremental (cada overnight): este source con max_pages: 1
          recoge novedades publicadas en la home /variant/.

      Ver scripts/wikis/mangavariant.py y el "URL como referencia" en
      CLAUDE.md.

