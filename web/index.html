<script>
function mangaApp() {
  return {
    loading: true,
    error: null,
    items: [],
    selectedItem: null,
    page: 1,
    perPage: 60,
    sort: "score_desc",
    filters: {
      search: "",
      country: "",
      publisher: "",
      language: "",
      productType: "",
      sourceClass: "",
      minScore: 30,
      onlyLimited: false,
    },
    detailFields: [
      { key: "product_type", label: "Tipo de producto" },
      { key: "author", label: "Autor" },
      { key: "publisher", label: "Editorial" },
      { key: "country", label: "PaГӯs" },
      { key: "language", label: "Idioma" },
      { key: "price", label: "Precio" },
      { key: "release_date", label: "Fecha de lanzamiento" },
      { key: "published_at", label: "Publicado en feed" },
      { key: "source_class", label: "Clase de fuente" },
      { key: "tags", label: "Tags" },
    ],

    async loadItems() {
      // 1. Intentar leer datos embebidos (generados por scripts/build_web.py).
      const inlineTag = document.getElementById("manga-data");
      if (inlineTag) {
        try {
          const inline = JSON.parse(inlineTag.textContent || "[]");
          if (Array.isArray(inline) && inline.length > 0) {
            this.items = this.dedupByUrl(inline);
            this.loading = false;
            return;
          }
        } catch (e) { /* sigue al fallback */ }
      }

      // 2. Fallback: fetch del JSONL (requiere servidor local).
      // Si abriste el HTML directo (file://), fetch falla por CORS. En ese caso:
      //   .venv/bin/python scripts/build_web.py    (embebe los datos)
      //   ./web/serve.sh                            (lanza server local)
      try {
        if (location.protocol === "file:") {
          throw new Error(
            "EstГЎs abriendo el HTML directo (file://). " +
            "CorrГ© 'python scripts/build_web.py' para embeber los datos, " +
            "o 'web/serve.sh' para lanzar un server local."
          );
        }
        const res = await fetch("../data/items.jsonl");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const lines = text.trim().split("\n").filter(Boolean);
        const parsed = lines.map(l => {
          try { return JSON.parse(l); } catch (e) { return null; }
        }).filter(Boolean);
        this.items = this.dedupByUrl(parsed);
        this.loading = false;
      } catch (e) {
        this.error = e.message;
        this.loading = false;
      }
    },

    dedupByUrl(items) {
      const byUrl = new Map();
      for (const item of items) {
        const existing = byUrl.get(item.url);
        if (!existing || (item.detected_at || "") > (existing.detected_at || "")) {
          byUrl.set(item.url, item);
        }
      }
      return Array.from(byUrl.values());
    },

    get unique() {
      const u = (key) => Array.from(new Set(this.items.map(i => i[key]).filter(Boolean))).sort();
      return {
        countries: u("country"),
        publishers: u("publisher"),
        languages: u("language"),
        productTypes: u("product_type"),
        sourceClasses: u("source_class"),
      };
    },

    get stats() {
      const lastDetected = this.items
        .map(i => i.detected_at)
        .filter(Boolean)
        .sort()
        .pop();
      return {
        total: this.items.length,
        countries: this.unique.countries.length,
        publishers: this.unique.publishers.length,
        lastDetected: lastDetected ? new Date(lastDetected).toLocaleDateString() : "",
      };
    },

    get filtered() {
      const f = this.filters;
      const q = f.search.trim().toLowerCase();
      return this.items.filter(i => {
        if (q && !(i.title || "").toLowerCase().includes(q)) return false;
        if (f.country && i.country !== f.country) return false;
        if (f.publisher && i.publisher !== f.publisher) return false;
        if (f.language && i.language !== f.language) return false;
        if (f.productType && i.product_type !== f.productType) return false;
        if (f.sourceClass && i.source_class !== f.sourceClass) return false;
        if ((i.score || 0) < f.minScore) return false;
        if (f.onlyLimited && i.stock_type !== "limited") return false;
        return true;
      });
    },

    get sorted() {
      const arr = [...this.filtered];
      const cmp = {
        score_desc: (a, b) => (b.score || 0) - (a.score || 0),
        score_asc:  (a, b) => (a.score || 0) - (b.score || 0),
        detected_desc: (a, b) => (b.detected_at || "").localeCompare(a.detected_at || ""),
        detected_asc:  (a, b) => (a.detected_at || "").localeCompare(b.detected_at || ""),
        title_asc:  (a, b) => (a.title || "").localeCompare(b.title || ""),
        title_desc: (a, b) => (b.title || "").localeCompare(a.title || ""),
      };
      return arr.sort(cmp[this.sort] || cmp.score_desc);
    },

    get totalPages() {
      return Math.max(1, Math.ceil(this.sorted.length / this.perPage));
    },

    get paginated() {
      // Reset page if out of range when filters change
      if (this.page > this.totalPages) this.page = 1;
      const start = (this.page - 1) * this.perPage;
      return this.sorted.slice(start, start + this.perPage);
    },

    scoreClass(score) {
      if (score >= 70) return "score-high";
      if (score >= 35) return "score-mid";
      return "score-low";
    },

    formatField(item, key) {
      const v = item[key];
      if (Array.isArray(v)) return v.join(", ");
      return v || "";
    },

    formatDate(iso) {
      if (!iso) return "";
      try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
    },

    openModal(item) { this.selectedItem = item; document.body.style.overflow = "hidden"; },
    closeModal() { this.selectedItem = null; document.body.style.overflow = ""; },

    resetFilters() {
      this.filters = {
        search: "", country: "", publisher: "", language: "",
        productType: "", sourceClass: "", minScore: 30, onlyLimited: false,
      };
      this.page = 1;
    },
  };
}

// ESC para cerrar modal
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    const root = document.querySelector("[x-data]");
    if (root && root.__x) root.__x.$data.closeModal();
  }
});
</script>
