      "volume", "author", "publisher", "country", "language", "price",
      "release_date", "isbn", "product_type", "rarity", "stock_type", "description_es"],
    EDIT_TEXTAREA: ["description", "description_es"],
    EDIT_LABELS: {
      title: "Título", title_original: "Título original", series_display: "Serie",
      edition_display: "Edición", volume: "Volumen", author: "Autor",
      publisher: "Editorial", country: "País", language: "Idioma",
      release_date: "Fecha de lanzamiento", isbn: "ISBN", product_type: "Tipo de producto",
      rarity: "Rareza", stock_type: "Stock", description_es: "Descripción (ES)",
      description: "Descripción original (fuente)", series_key: "series_key",
      edition_key: "edition_key", slug: "slug", cluster_key: "cluster_key", url: "url",
      status: "Estado", score: "Score", source: "Fuente (nombre)",
      source_class: "Clase de fuente", source_url: "URL de fuente",
      published_at: "Publicado en feed", detected_at: "Detectado",
      standardized_at: "Estandarizado", content_hash: "content_hash",
      signal_types: "signal_types", signals: "signals", tags: "tags",
      extras: "extras", sources: "sources", approved_at: "approved_at",
      approved_by: "approved_by",
    },

    async init() {
      await this.loadItems();
      this.loadReportedUrls();
      this.loadAliases();
      this._loadStateFromUrl();
      // hashchange: manual edits a URL bar. popstate: botón back/forward del
      // browser (pushState entries no disparan hashchange si la URL completa
      // no cambia el hash, así que ambos listeners son necesarios).
      window.addEventListener("hashchange", () => this._loadStateFromUrl());
      window.addEventListener("popstate", () => this._loadStateFromUrl());
    },

    async loadItems() {
      // Prioridad: items.jsonl EN VIVO (decisión #5 — el dashboard refleja
      // siempre el estado actual tras cualquier retrofit/curación). La copia
      // embebida (<script id="manga-data">, generada por build_web.py) es
      // SOLO fallback: file:// (doble-click) o fetch fallido — si se usara
      // primero, el dashboard servido mostraría datos stale hasta re-correr
      // build_web.
      const loadInline = () => {
        const inlineTag = document.getElementById("manga-data");
        if (!inlineTag) return false;
        try {
          const inline = JSON.parse(inlineTag.textContent || "[]");
          if (Array.isArray(inline) && inline.length > 0) {
            this.items = this.dedupByUrl(inline);
            this._indexSearch();
            this._bumpData();
            this.loading = false;
            return true;
          }
        } catch (e) { /* fallback */ }
        return false;
      };

      try {
        if (location.protocol === "file:") {
          if (loadInline()) return;
          throw new Error(
            "Estás abriendo el HTML directo (file://). " +
            "Corré 'python scripts/build_web.py' para embeber los datos, " +
            "o 'web/serve.sh' para lanzar un server local."
          );
        }
        // cache-bust: tras editar imágenes en el gestor y "Volver al detalle",
        // queremos los datos frescos, no la copia cacheada por el navegador.
        const res = await fetch("../data/items.jsonl?_=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const lines = text.trim().split("\n").filter(Boolean);
        const parsed = lines.map(l => {
          try { return JSON.parse(l); } catch (e) { return null; }
        }).filter(Boolean);
        this.items = this.dedupByUrl(parsed);
        this._indexSearch();
        this._bumpData();
        this.loading = false;
      } catch (e) {
        if (loadInline()) return;
        this.error = e.message;
        this.loading = false;
      }
    },

    // Tipo de edición desde el edition_key ({series}-{pub}-{slug}-{país}[-cN]).
    // Desde la política de títulos 2026-06-12 el title oficial ya no lleva el
    // tipo inyectado — se muestra como badge. Mantener allowlist de países en
    // sync con _VALID_COUNTRY (fix_lmc_display_titles.py) y labels con
    // EDITION_TYPE_LABELS (web-next/lib/format.ts).
    _editionCountries: new Set(["es","it","fr","us","jp","mx","br","de","xx","vn","th","tw","gb","kr","pt","ar","pe","cl","eslatam","latam"]),
    _editionTypeLabels: {
      special: "Edición especial", limited: "Edición limitada",
      collector: "Coleccionista", deluxe: "Deluxe", kanzenban: "Kanzenban",
      perfect: "Perfect", coffret: "Coffret", boxset: "Box Set",
      cofanetto: "Cofanetto", variant: "Variante", anniversary: "Aniversario",
      celebration: "Celebración", color: "Color", maximum: "Maximum",
      ultimate: "Ultimate", master: "Master", library: "Library",
      integral: "Integral", artbook: "Artbook", fanbook: "Fanbook",
      guidebook: "Guidebook", magazine: "Revista", steelbox: "Steelbox",
      slipcase: "Slipcase", prestige: "Prestige", grimorio: "Grimorio",
      grimoire: "Grimoire", omnibus: "Omnibus",
    },
    editionTypeLabel(item) {
      let parts = (item.edition_key || "").split("-");
      if (parts.length && /^c\d+$/.test(parts[parts.length - 1])) parts = parts.slice(0, -1);
      if (parts.length && this._editionCountries.has(parts[parts.length - 1])) parts = parts.slice(0, -1);
      const slug = parts.length >= 2 ? parts[parts.length - 1] : "";
      return this._editionTypeLabels[slug] || null;
    },

    // Índice de aliases por series_key (data/series_aliases.json, generado por
    // export_series_aliases.py). La búsqueda matchea también contra los
    // aliases multilingües de la serie: el title es el nombre OFICIAL de cada
    // edición (no se renombra), así "demon slayer" encuentra "Guardianes de
    // la Noche 8". En file:// no está disponible (solo pierde alias-search).
    async loadAliases() {
      try {
        const res = await fetch("../data/series_aliases.json");
        if (!res.ok) return;
        const data = await res.json();
        const idx = {};
        for (const [key, names] of Object.entries(data)) {
          idx[key] = names.join(" ").toLowerCase();
        }
        this.aliasIndex = idx;
        // Re-indexar: el haystack precomputado por item ahora incluye los
        // aliases multilingües de su serie (así "demon slayer" matchea el title
        // oficial "Guardianes de la Noche 8"). Bump → invalida el pipeline.
        if (this.items.length) { this._indexSearch(); this._bumpData(); }
      } catch (e) { /* series_aliases.json may not exist yet */ }
    },

    async loadReportedUrls() {
      try {
        const res = await fetch("../data/feedback.jsonl");
        if (!res.ok) return;
        const text = await res.text();
        const urls = {};
        text.trim().split("\n").filter(Boolean).forEach(line => {
          try { const o = JSON.parse(line); if (o.url) urls[o.url] = true; } catch (e) {}
        });
        this.reportedUrls = urls;
      } catch (e) { /* feedback.jsonl may not exist yet */ }
    },

    // Mantener en sync con TRACKING_PARAMS en scripts/manga_watch.py
    _trackingParams: new Set([
      "_pos", "_sid", "_ss", "_psq", "_v",
      "utm_source", "utm_medium", "utm_campaign", "utm_term", "utm_content",
      "gclid", "fbclid", "msclkid", "yclid", "dclid", "ttclid",
      "mc_cid", "mc_eid",
      "ref", "source", "affiliate", "aff", "tag",
      "___store", "___from_store",
    ]),

    normalizeUrlForDedup(url) {
      if (!url) return url;
      try {
        const u = new URL(url);
        const keep = [];
        for (const [k, v] of u.searchParams.entries()) {
          if (!this._trackingParams.has(k)) keep.push([k, v]);
        }
        keep.sort((a, b) => a[0].localeCompare(b[0]));
        u.search = keep.length
          ? "?" + keep.map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join("&")
          : "";
        u.pathname = u.pathname.replace(/^\/collections\/[^/]+\/(products\/.+)$/, "/$1");
        if (u.pathname.length > 1 && u.pathname.endsWith("/")) {
          u.pathname = u.pathname.replace(/\/+$/, "");
        }
        u.host = u.host.toLowerCase();
        u.hash = "";
        return u.toString();
      } catch (e) {
        return url;
      }
    },

    dedupByUrl(items) {
      // Completitud: prioriza el item con más metadata (ISBN > imagen).
      const comp = (x) => (x.isbn ? 100 : 0) + ((x.images && x.images.length) ? 10 : 0);
      const pickWinner = (a, b) => {
        if (!a) return b;
        if (!b) return a;
        const ca = comp(a), cb = comp(b);
        if (cb > ca) return b;
        if (cb < ca) return a;
        return (b.detected_at || "") > (a.detected_at || "") ? b : a;
      };

      const sourceEntry = (item) => ({
        name:         item.source || "",
        source_class: item.source_class || "",
        country:      item.country || "",
        publisher:    item.publisher || "",
        language:     item.language || "",
        url:          item.url || "",
        image_url:    this.coverImage(item).url || "",
        image_local:  this.coverImage(item).local || "",
        stock_type:   item.stock_type || "",
        detected_at:  item.detected_at || "",
        release_date: item.release_date || "",
      });

      const byUrl = new Map();
      for (const item of items) {
        const key = this.normalizeUrlForDedup(item.url);
        byUrl.set(key, pickWinner(byUrl.get(key), item));
      }

      // Modelo 1-fila-por-producto: cada fila puede traer un `sources[]`
      // guardado (consolidación al ingestar). Agrupamos TODO por cluster_key
      // (sin bypass) y unimos los `sources[]` guardados; así una fila ya
      // consolidada + cualquier fila suelta del mismo producto colapsan en una
      // sola card sin perder fuentes. Dedup de fuentes por URL normalizada.
      const clusterGroups = new Map();
      for (const item of byUrl.values()) {
        let key = item.cluster_key;
        if (!key) {
          const isbn = (item.isbn || "").trim();
          key = isbn ? `isbn:${isbn}` : `url:${item.url || ""}`;
        }
        if (!clusterGroups.has(key)) clusterGroups.set(key, []);
        clusterGroups.get(key).push(item);
      }

      // Une los sources[] de todos los miembros del grupo (usa el guardado si
      // existe, si no [self]); dedup por URL normalizada, canónica primero.
      const mergeSources = (group, canonical) => {
        const seen = new Set();
        const out = [];
        for (const it of group) {
          const entries = (Array.isArray(it.sources) && it.sources.length) ? it.sources : [sourceEntry(it)];
          for (const s of entries) {
            const u = this.normalizeUrlForDedup(s.url || "");
            if (seen.has(u)) continue;
            seen.add(u);
            out.push(s);
          }
        }
        out.sort((a, b) => (a.url === canonical.url ? 0 : 1) - (b.url === canonical.url ? 0 : 1)
                           || (a.country || "").localeCompare(b.country || ""));
        return out;
      };

      const final = [];
      for (const group of clusterGroups.values()) {
        if (group.length === 1) {
          const only = group[0];
          const sources = (Array.isArray(only.sources) && only.sources.length) ? only.sources : [sourceEntry(only)];
          final.push({ ...only, sources });
        } else {
          let canonical = group[0];
          for (const it of group.slice(1)) canonical = pickWinner(canonical, it);
          const merged = { ...canonical };
          const completable = ["author", "price",
                               "release_date", "description", "isbn", "publisher"];
          for (const field of completable) {
            if (!merged[field]) {
              for (const it of group) {
                if (it[field]) { merged[field] = it[field]; break; }
              }
            }
          }
          // Fase 2 — union de `images[]` y `extras[]` cross-source. Dos
          // fuentes del mismo cluster pueden aportar imágenes distintas
          // (ListadoManga colecciones agrega extras de 1ª edición; Norma
          // o Mangavariant aportan la cover de catálogo). El carrusel
          // muestra todas, deduplicadas por URL (sin esquema).
          // IMPORTANTE: la portada de la canónica (la que muestra la card,
          // canonical.images[0]) va SIEMPRE primera, para que carrusel[0] == card.
          // Sin esto, mergedImages quedaba en orden de archivo y el carrusel
          // podía empezar con la foto de otra fuente (bug card != carrusel a
          // nivel cluster).
          // Clave de dedup de imágenes — MISMA semántica que
          // manga_watch._img_stem (Python, fuente canónica) y
          // web-next/lib/images.ts `imageKey`. Si tocás una, tocá las tres
          // (docs/reference/images.md#carrusel-cluster; tests en
          // tests/test_audit_wo_g.py / web-next/__tests__/images.test.ts).
          // Sólo sufijos de tamaño de CDN con GUION BAJO (Shopify
          // `_600x600.jpg`, `_grande.jpg`) se stripean para que el thumb
          // dedupee contra la full — los de WordPress con guion medio
          // (`-800x600.jpg`) NO se stripean: es una limitación conocida de
          // la referencia Python (su docstring menciona "WP -NxM" pero la
          // regex nunca lo implementó; ver tests/test_audit_wo_g.py).
          const IMG_KEY_SUFFIX_RE = /_(?:\d+x\d+|small|medium|grande|large|master|compact|original|x\d+|pico|icon|thumb|mini|crop_center)(?=\.(?:jpe?g|png|webp|gif|avif)(?:\?|$))/gi;
          const imgKey = (u) => (u || "")
            .replace(IMG_KEY_SUFFIX_RE, "")
            .split(/[?#]/)[0]
            .replace(/^https?:\/\//, "")
            .toLowerCase();
          const seenImg = new Set();
          const mergedImages = [];
          const pushImg = (im) => {
            if (!im || !im.url) return;
            const k = imgKey(im.url);
            if (seenImg.has(k)) return;
            seenImg.add(k);
            mergedImages.push(im);
          };
          // 1) la portada canónica primero: images[0] de la fila canónica es la
          //    única fuente de verdad de la portada.
          const canonImgs = Array.isArray(canonical.images) ? canonical.images : [];
          const coverImg = canonImgs.find(im => im && im.url);
          if (coverImg) pushImg(coverImg);
          // 2) el resto de la galería del cluster
          for (const it of group) {
            const arr = Array.isArray(it.images) ? it.images : [];
            for (const im of arr) pushImg(im);
          }
          if (mergedImages.length) merged.images = mergedImages;
          const seenEx = new Set();
          const mergedExtras = [];
          for (const it of group) {
            const arr = Array.isArray(it.extras) ? it.extras : [];
            for (const ex of arr) {
              if (!ex || !ex.description) continue;
              const k = `${ex.description}::${ex.release_date || ""}`;
              if (seenEx.has(k)) continue;
              seenEx.add(k);
              mergedExtras.push(ex);
            }
          }
          if (mergedExtras.length) merged.extras = mergedExtras;
          merged.sources = mergeSources(group, canonical);
          final.push(merged);
        }
      }

      return final;
    },

    // Bump de versión del dataset → invalida las caches memoizadas. Llamar
    // SIEMPRE que items[] cambie (carga, aprobación in-place, edición inline).
    _bumpData() { this._dataVersion++; },

    // Precomputa el "haystack" de búsqueda por item UNA sola vez (no en cada
    // tecla). Mismo contenido que la búsqueda histórica: title + title_original
    // + series_display + aliases multilingües de la serie. Se reconstruye al
    // cargar items, al cargar aliases y al editar un item (saveEdit).
    _indexSearch() {
      const idx = this.aliasIndex || {};
      for (const i of this.items) {
        i._search = [
          i.title || "", i.title_original || "", i.series_display || "",
          idx[i.series_key] || "",
        ].join(" ").toLowerCase();
      }
    },

    // Commit de la búsqueda: del input crudo (searchInput) a filters.search, que
    // es lo que el pipeline observa. Disparado por el botón "Buscar" o Enter.
    applySearch() {
      this.filters.search = (this.searchInput || "").trim();
      this.page = 1;
      this._syncStateToUrl();
    },

    // Cadena cara filtered→sorted→editions, MEMOIZADA por firma. Lee todos los
    // inputs reactivos primero (registra deps en Alpine aun en cache-hit) y, si
    // la firma coincide con la cacheada, devuelve sin recomputar. Antes esto
    // corría varias veces por render (un getter por referencia en el template).
    _pipeline() {
      const f = this.filters;
      const sig = JSON.stringify([
        f.search, f.country, f.publisher, f.language, f.productType,
        f.sourceClass, f.signalTypes.join("|"), f.rarities.join("|"),
        f.onlyLimited, f.approval, this.sort, this._dataVersion,
      ]);
      if (_pipeCache.sig === sig) return _pipeCache.value;

      const q = (f.search || "").trim().toLowerCase();
      const filtered = this.items.filter(i => {
        if (q && !(i._search || "").includes(q)) return false;
        if (f.country && i.country !== f.country) return false;
        if (f.publisher && i.publisher !== f.publisher) return false;
        if (f.language && i.language !== f.language) return false;
        if (f.productType && i.product_type !== f.productType) return false;
        if (f.sourceClass && i.source_class !== f.sourceClass) return false;
        if (f.signalTypes && f.signalTypes.length > 0) {
          const itemSigs = Array.isArray(i.signal_types) ? i.signal_types : [];
          if (!f.signalTypes.some(s => itemSigs.includes(s))) return false;
        }
        if (f.rarities && f.rarities.length > 0) {
          if (!f.rarities.includes(i.rarity)) return false;
        }
        if (f.onlyLimited && i.stock_type !== "limited") return false;
        if (f.approval === "approved" && !i.approved_at) return false;
        if (f.approval === "pending" && i.approved_at) return false;
        return true;
      });

      const cmp = {
        detected_desc: (a, b) => (b.detected_at || "").localeCompare(a.detected_at || ""),
        detected_asc:  (a, b) => (a.detected_at || "").localeCompare(b.detected_at || ""),
        title_asc:  (a, b) => (a.title || "").localeCompare(b.title || ""),
        title_desc: (a, b) => (b.title || "").localeCompare(a.title || ""),
      };
      const sorted = [...filtered].sort(cmp[this.sort] || cmp.detected_desc);
      const editions = this._computeEditions(sorted);

      _pipeCache = { sig, value: { filtered, sorted, editions } };
      return _pipeCache.value;
    },

    get unique() {
      if (_uniqueCache.v === this._dataVersion) return _uniqueCache.value;
      const u = (key) => Array.from(new Set(this.items.map(i => i[key]).filter(Boolean))).sort();
      const signalTypes = Array.from(new Set(
        this.items.flatMap(i => Array.isArray(i.signal_types) ? i.signal_types : []).filter(Boolean)
      )).sort();
      const value = {
        countries: u("country"),
        publishers: u("publisher"),
        languages: u("language"),
        productTypes: u("product_type"),
        sourceClasses: u("source_class"),
        signalTypes,
      };
      _uniqueCache = { v: this._dataVersion, value };
      return value;
    },

    get stats() {
      if (_statsCache.v === this._dataVersion) return _statsCache.value;
      const lastDetected = this.items
        .map(i => i.detected_at)
        .filter(Boolean)
        .sort()
        .pop();
      const editions = new Set(this.items.map(i => i.edition_key || `__solo__${i.url}`)).size;
      const uniq = this.unique;
      const value = {
        total: this.items.length,
        editions,
        countries: uniq.countries.length,
        publishers: uniq.publishers.length,
        lastDetected: lastDetected ? new Date(lastDetected).toLocaleDateString() : "",
      };
      _statsCache = { v: this._dataVersion, value };
      return value;
    },

    // filtered / sorted / editions: getters finos sobre el pipeline memoizado
    // (_pipeline()). La lógica de filtro/orden vive en _pipeline; acá sólo se
    // expone el resultado cacheado para no recomputar por cada referencia del
    // template.
    get filtered() { return this._pipeline().filtered; },

    get sorted() { return this._pipeline().sorted; },

    // Parsea un valor de "volume" a número para comparar.
    // "1" → 1, "1.5" → 1.5, "Box" → +Inf (queda al final), "" → +Inf.
    _volumeNumber(v) {
      if (v === null || v === undefined) return Infinity;
      const s = String(v).trim();
      if (!s) return Infinity;
      const m = s.match(/(\d+(?:\.\d+)?)/);
      return m ? parseFloat(m[1]) : Infinity;
    },

    // Rango de kind para desempate dentro del mismo volumen (gotcha #60).
    // Orden global: regular(0) → variant(1) → special/limited(2) →
    // deluxe/kanzenban(3) → artbook/fanbook(4) → boxset(5) → desconocido(10).
    // Fuente del kind: cluster_key lmc ("lmc:N:KIND:vol") o signal_types/edition_key.
    _kindRank(item) {
      const KIND_RANK = {
        regular: 0,
        variant: 1, alternativa: 1,
        special: 2, especial: 2, limited: 2, limitada: 2,
        collector: 2, premium: 2,
        deluxe: 3, kanzenban: 3, omnibus: 3, hardcover: 3,
        artbook: 4, fanbook: 4, guidebook: 4,
        box: 5, boxset: 5,
      };
      // Tier 1: cluster_key lmc → kind en posición 2
      const ck = item.cluster_key || "";
      if (ck.startsWith("lmc:")) {
        const parts = ck.split(":");
        if (parts.length >= 3) {
          const k = parts[2];
          if (k in KIND_RANK) return KIND_RANK[k];
        }
      }
      // Tier 2: edition_key slug → penúltimo segmento antes del país
      const ek = (item.edition_key || "").split("-");
      if (ek.length >= 2) {
        const k = ek[ek.length - 2];
        if (k in KIND_RANK) return KIND_RANK[k];
      }
      // Tier 3: signal_types
      const sigs = item.signal_types || [];
      if (sigs.includes("variant_cover")) return 1;
      if (sigs.includes("special_edition") || sigs.includes("limited") ||
          sigs.includes("collector") || sigs.includes("premium_format")) return 2;
      if (sigs.includes("artbook") || sigs.includes("fanbook")) return 4;
      if (sigs.includes("box_set") || sigs.includes("bundle")) return 5;
      return 10;
    },

    // Display de un grupo: "{series_display} {edition_display}" para que
    // las cards de edición digan "Blue Lock Coffret (Pika)" y no solo
    // "Coffret (Pika)". Skip el prefijo si edition_display ya empieza
    // por la serie (raro, ej. "Real x Vagabond"). Fallback al título.
    _editionDisplay(leader) {
      const sd = (leader.series_display || "").trim();
      const ed = (leader.edition_display || "").trim();
      if (sd && ed) {
        if (ed.toLowerCase().startsWith(sd.toLowerCase())) return ed;
        return `${sd} ${ed}`;
      }
      return ed || sd || leader.title || "(sin edición)";
    },

    // Agrupa items.sorted por edition_key. Items sin edition_key son
    // grupos singleton (su propia URL como key). Devuelve un array de
    // grupos { edition_key, display, leader, tomoCount, volumeRange }.
    // El leader es el tomo de menor número (parseado); en empate, mayor completitud.
    get editions() { return this._pipeline().editions; },

    // Agrupa un array YA filtrado+ordenado por edition_key (lo llama _pipeline).
    _computeEditions(arr) {
      const groups = new Map();
      const order = [];
      for (const item of arr) {
        const ek = item.edition_key || `__solo__${item.url}`;
        if (!groups.has(ek)) {
          groups.set(ek, []);
          order.push(ek);
        }
        groups.get(ek).push(item);
      }
      const editionList = [];
      for (const ek of order) {
        const g = groups.get(ek);
        // Leader: menor volumen numérico; tie-break por completitud (ISBN/imagen) desc, luego detected desc.
        const comp = (x) => (x.isbn ? 100 : 0) + ((x.images && x.images.length) ? 10 : 0);
        const leader = [...g].sort((a, b) => {
          const va = this._volumeNumber(a.volume);
          const vb = this._volumeNumber(b.volume);
          if (va !== vb) return va - vb;
          const kr = this._kindRank(a) - this._kindRank(b);
          if (kr !== 0) return kr;
          if (comp(b) !== comp(a)) return comp(b) - comp(a);
          return (b.detected_at || "").localeCompare(a.detected_at || "");
        })[0];
        // Display de la edición: "{series_display} {edition_display}".
        const display = this._editionDisplay(leader);
        // Rango de tomos: "Vol 1–14" si todos numéricos.
        let volumeRange = "";
        if (g.length > 1) {
          const nums = g
            .map(it => this._volumeNumber(it.volume))
            .filter(n => isFinite(n));
          if (nums.length > 1) {
            const min = Math.min(...nums);
            const max = Math.max(...nums);
            if (min !== max) {
              const fmt = (n) => Number.isInteger(n) ? String(n) : n.toFixed(1);
              volumeRange = `Vol ${fmt(min)}–${fmt(max)}`;
            }
          }
        }
        editionList.push({
          edition_key: ek,
          display,
          leader,
          tomoCount: g.length,
          volumeRange,
          items: g,
        });
      }
      return editionList;
    },

    // Items de la edición actualmente seleccionada (view === 'edition'),
    // filtrados + ordenados por número de volumen ascendente.
    get currentEdition() {
      if (this.view !== 'edition' || !this.currentEditionKey) return null;
      const ek = this.currentEditionKey;
      const items = this.sorted.filter(i =>
        (i.edition_key || `__solo__${i.url}`) === ek
      );
      if (items.length === 0) return null;
      const sortedByVol = [...items].sort((a, b) => {
        const va = this._volumeNumber(a.volume);
        const vb = this._volumeNumber(b.volume);
        if (va !== vb) return va - vb;
        return this._kindRank(a) - this._kindRank(b);
      });
      const leader = sortedByVol[0];
      const display = this._editionDisplay(leader);
      return { edition_key: ek, display, items: sortedByVol };
    },

    // Estado de aprobación de la edición abierta (para el botón "aprobar toda
    // la edición" de la vista de edición).
    get editionApprovalState() {
      const e = this.currentEdition;
      if (!e || !e.items.length) return { total: 0, approved: 0, all: false };
      const approved = e.items.filter(i => i.approved_at).length;
      return { total: e.items.length, approved, all: approved === e.items.length };
    },
    async toggleApproveEdition() {
      const e = this.currentEdition;
      if (!e || !e.items.length || (e.edition_key || '').startsWith('__solo__')) return;
      const willApprove = !this.editionApprovalState.all;
      try {
        const res = await fetch('/api/approve-edition', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ edition_key: e.edition_key, approved: willApprove }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        const stamp = data.approved ? new Date().toISOString() : '';
        const owner = data.approved ? 'owner' : '';
        for (const it of this.items) {
          if (it.edition_key === e.edition_key) { it.approved_at = stamp; it.approved_by = owner; }
        }
        this._bumpData();   // approved_at cambió → invalidar pipeline/stats
      } catch (err) {
        alert('Error al aprobar la edición: ' + err.message);
      }
    },

    // Tomos hermanos del item abierto en el detalle (misma edición),
    // ordenados por volumen. Vacío si el item no tiene edición o es único.
    // Se usa para las flechas de navegación laterales del detalle.
    get volumeSiblings() {
      const si = this.selectedItem;
      if (!si || !si.edition_key) return [];
      const items = this.items.filter(i => i.edition_key === si.edition_key);
      if (items.length <= 1) return [];
      return [...items].sort((a, b) => {
        const va = this._volumeNumber(a.volume);
        const vb = this._volumeNumber(b.volume);
        if (va !== vb) return va - vb;
        return (a.title || "").localeCompare(b.title || "");
      });
    },
    get volumeNavIndex() {
      const sibs = this.volumeSiblings;
      if (!sibs.length || !this.selectedItem) return -1;
      return sibs.findIndex(i => i.url === this.selectedItem.url);
    },
    hasVolumePrev() { return this.volumeNavIndex > 0; },
    hasVolumeNext() {
      const idx = this.volumeNavIndex;
      return idx >= 0 && idx < this.volumeSiblings.length - 1;
    },
    volumeNavPrev() {
      const sibs = this.volumeSiblings, idx = this.volumeNavIndex;
      if (idx > 0) this.openVolume(sibs[idx - 1]);
    },
    volumeNavNext() {
      const sibs = this.volumeSiblings, idx = this.volumeNavIndex;
      if (idx >= 0 && idx < sibs.length - 1) this.openVolume(sibs[idx + 1]);
    },

    // Lista a paginar según view actual.
    get _activeList() {
      if (this.view === 'edition') {
        const e = this.currentEdition;
        return e ? e.items : [];
      }
      // catalog (y fallback)
      return this.editions;
    },

    get totalPages() {
      return Math.max(1, Math.ceil(this._activeList.length / this.perPage));
    },

    get paginated() {
      if (this.page > this.totalPages) {
        this.page = 1;
        this._syncStateToUrl();
      }
      const start = (this.page - 1) * this.perPage;
      return this._activeList.slice(start, start + this.perPage);
    },

    // Portada canónica de un item: `images[0]` es la ÚNICA fuente de verdad
    // (los campos top-level image_url/image_local fueron eliminados, 2026-06-09).
    // Ver "Image storage" en CLAUDE.md / docs/reference/images.md.
    coverImage(item) {
      if (!item) return { url: "", local: "" };
      const imgs = Array.isArray(item.images) ? item.images : [];
      const first = imgs.find(im => im && im.url);
      return first || { url: "", local: "" };
    },

    coverSrc(item) {
      // Espejo local primero (images[0].local), URL remota como fallback.
      const im = this.coverImage(item);
      if (im && im.local) return "../data/images/" + im.local;
      return (im && im.url) || "";
    },

    // Carrusel modal: si el item trae `images[]` con varias imágenes
    // (portada + galería/extras), se muestra como carrusel en el modal.
    itemImages(item) {
      if (!item) return [];
      const imgs = Array.isArray(item.images) ? item.images : [];
      // Filtramos elementos sin url (placeholders del schema).
      return imgs.filter(im => im && im.url);
    },

    carouselSrc(item, idx) {
      const imgs = this.itemImages(item);
      if (!imgs.length) return this.coverSrc(item);
      const im = imgs[Math.max(0, Math.min(idx, imgs.length - 1))] || {};
      if (im.local) return "../data/images/" + im.local;
      return im.url || "";
    },

    onCoverError(ev) {
      // Si la copia local falla, reintenta una vez con la URL remota (images[0].url).
      // Si también falla, oculta el <img> y muestra el placeholder 📚.
      const img = ev.target;
      const fallback = img.dataset.fallback || "";
      if (fallback && !img.dataset.triedFallback && img.src !== fallback) {
        img.dataset.triedFallback = "1";
        img.src = fallback;
        return;
      }
      img.style.display = "none";
      if (img.nextElementSibling) img.nextElementSibling.style.display = "flex";
    },

    formatField(item, key) {
      const v = item[key];
      if (Array.isArray(v)) return v.join(", ");
      return v || "";
    },

    formatDate(iso) {
      if (!iso) return "";
      try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
    },

    // --- Navegación entre vistas ---
    goHome() {
      const wasInDifferentView = this.view !== 'catalog';
      this.lightboxOpen = false; document.body.style.overflow = '';
      this.editMode = false;
      this.view = 'catalog';
      this.currentEditionKey = '';
      this.currentVolumeUrl = '';
      this.selectedItem = null;
      this._resetFeedback();
      this.page = 1;
      this._syncStateToUrl({ push: wasInDifferentView });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    openEditionByKey(editionKey) {
      if (!editionKey) return;
      // Single-tomo o sin edition_key (solo): saltar directo a la vista de volumen.
      if (editionKey.startsWith('__solo__')) {
        const ed = this.editions.find(e => e.edition_key === editionKey);
        if (ed) return this.openVolume(ed.leader);
        return;
      }
      const isViewChange = this.view !== 'edition' || this.currentEditionKey !== editionKey;
      this.view = 'edition';
      this.currentEditionKey = editionKey;
      this.currentVolumeUrl = '';
      this.selectedItem = null;
      this._resetFeedback();
      this.page = 1;
      this._syncStateToUrl({ push: isViewChange });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    openVolume(item) {
      if (!item) return;
      const isViewChange = this.view !== 'volume' || this.currentVolumeUrl !== item.url;
      this.view = 'volume';
      this.currentVolumeUrl = item.url || '';
      this.selectedItem = item;
      this.modalImageIdx = 0;  // reset carrusel al abrir item nuevo
      this.lightboxOpen = false; document.body.style.overflow = '';
      this.editMode = false;  // no arrastrar el editor entre tomos
      this.copiedTitle = false;
      this._resetFeedback();
      this._syncStateToUrl({ push: isViewChange });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    goBack() {
      // Si vengo de una edición multi-tomo, vuelvo a la edición; sino al catálogo.
      if (this.selectedItem && this.selectedItem.edition_key) {
        const ek = this.selectedItem.edition_key;
        // Buscar el conteo de la edición en el dataset completo (no filtrado).
        const sameEdition = this.items.filter(i => i.edition_key === ek);
        if (sameEdition.length > 1) {
          this.openEditionByKey(ek);
          return;
        }
      }
      this.goHome();
    },

    // --- Hash routing ---
    // #/                            → catalog
    // #/edition/<urlencoded-key>    → edition view
    // #/volume/<urlencoded-url>     → volume view
    //
    // push=true (cambio de vista) → pushState → el botón back del browser
    // navega entre vistas. push=false (cambio de filtro/página dentro de la
    // misma vista) → replaceState para no contaminar el historial.
    _syncStateToUrl({ push = false } = {}) {
      try {
        let hash = '';
        if (this.view === 'edition' && this.currentEditionKey) {
          hash = `#/edition/${encodeURIComponent(this.currentEditionKey)}`;
        } else if (this.view === 'volume' && this.currentVolumeUrl) {
          hash = `#/volume/${encodeURIComponent(this.currentVolumeUrl)}`;
        }
        const u = new URL(window.location.href);
        if (this.view !== 'volume' && this.page > 1) {
          u.searchParams.set('page', String(this.page));
        } else {
          u.searchParams.delete('page');
        }
        const target = u.pathname + u.search + hash;
        const current = window.location.pathname + window.location.search + window.location.hash;
        if (target !== current) {
          if (push) history.pushState({}, '', target);
          else history.replaceState({}, '', target);
        }
      } catch (e) { /* ignore */ }
    },

    _loadStateFromUrl() {
      try {
        const h = (window.location.hash || '').replace(/^#\/?/, '');
        const u2 = new URL(window.location.href);
        const pageQ = parseInt(u2.searchParams.get('page') || '0', 10);
        const searchQ = u2.searchParams.get('q') || '';
        if (searchQ) {
          this.filters.search = searchQ;
          this.searchInput = searchQ;   // que el input refleje el estado de la URL
        }
        if (!h) {
          this.view = 'catalog';
          this.currentEditionKey = '';
          this.currentVolumeUrl = '';
          this.selectedItem = null;
          this.page = pageQ > 0 ? pageQ : 1;
          return;
        }
        const [type, ...rest] = h.split('/');
        const raw = rest.join('/');
        if (type === 'edition' && raw) {
          this.view = 'edition';
          this.currentEditionKey = decodeURIComponent(raw);
          this.currentVolumeUrl = '';
          this.selectedItem = null;
          this.page = pageQ > 0 ? pageQ : 1;
          return;
        }
        if (type === 'volume' && raw) {
          const url = decodeURIComponent(raw);
          this.view = 'volume';
          this.currentVolumeUrl = url;
          const match = this.items.find(i => i.url === url);
          this.selectedItem = match || null;
          this.page = 1;
          return;
        }
        // hash inválido → reset a catalog.
        this.view = 'catalog';
        this.currentEditionKey = '';
        this.currentVolumeUrl = '';
        this.selectedItem = null;
        this.page = pageQ > 0 ? pageQ : 1;
      } catch (e) { /* ignore */ }
    },

    // --- Curation (unified: feedback + move + merge + remove) ---
    curationOpen: false,
    curationAction: "feedback",
    curationSearch: "",
    curationResults: [],
    curationTarget: "",
    curationTargetDisplay: "",
    curationDuplicateOf: "",
    curationReason: "",
    curationSending: false,
    curationSent: false,
    curationError: "",
    // Legacy aliases so existing code doesn't break
    get feedbackOpen() { return this.curationOpen && this.curationAction === "feedback"; },
    get feedbackSent() { return this.curationSent; },
    _resetCuration() {
      this.curationOpen = false;
      this.curationAction = "feedback";
      this.curationSearch = "";
      this.curationResults = [];
      this.curationTarget = "";
      this.curationTargetDisplay = "";
      this.curationDuplicateOf = "";
      this.curationReason = "";
      this.curationSending = false;
      this.curationSent = false;
      this.curationError = "";
    },
    _resetFeedback() { this._resetCuration(); },
    toggleFeedback() { this.toggleCuration(); },
    cancelFeedback() { this._resetCuration(); },
    toggleCuration() {
      if (this.curationOpen) {
        this._resetCuration();
      } else {
        this.curationOpen = true;
        this.curationAction = "feedback";
        this.curationSent = false;
        this.curationError = "";
      }
    },
    closeCuration() { this._resetCuration(); },
    async searchEditions() {
      const q = (this.curationSearch || "").trim();
      if (q.length < 2) { this.curationResults = []; return; }
      try {
        const res = await fetch("/api/editions/search?q=" + encodeURIComponent(q));
        const data = await res.json();
        this.curationResults = data.results || [];
      } catch { this.curationResults = []; }
    },
    canSubmitCuration() {
      if (this.curationAction === "feedback")
        return !!this.curationReason.trim() &&
               !(this.selectedItem && this.isReported(this.selectedItem.url));
      if (this.curationAction === "move") return !!this.curationTarget;
      if (this.curationAction === "merge") return !!this.curationDuplicateOf.trim();
      if (this.curationAction === "remove") return true;
      return false;
    },
    async submitCuration() {
      if (!this.selectedItem || !this.canSubmitCuration()) return;
      const itemUrl = this.selectedItem.url;
      // Guard: no re-reportar un item ya en la cola (se rehabilita al procesarla).
      if (this.curationAction === "feedback" && this.isReported(itemUrl)) {
        this.curationError = "Ya reportado — pendiente de procesar.";
        return;
      }
      this.curationSending = true;
      this.curationError = "";
      const reason = this.curationReason.trim();
      try {
        let endpoint, body;
        if (this.curationAction === "feedback") {
          endpoint = "/api/feedback";
          body = { title: this.selectedItem.title || "", url: itemUrl, reason };
        } else if (this.curationAction === "move") {
          endpoint = "/api/curation/move";
          body = { url: itemUrl, to_edition: this.curationTarget, reason };
        } else if (this.curationAction === "merge") {
          endpoint = "/api/curation/merge";
          body = { url: itemUrl, duplicate_of: this.curationDuplicateOf.trim(), reason };
        } else {
          endpoint = "/api/curation/remove";
          body = { url: itemUrl, reason };
        }
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        this.curationSent = true;
        if (this.curationAction === "feedback") {
          this.reportedUrls = { ...this.reportedUrls, [itemUrl]: true };
        }
        setTimeout(() => {
          if (this.curationSent) this._resetCuration();
        }, 2000);
      } catch (e) {
        this.curationError = "Error: " + e.message;
      } finally {
        this.curationSending = false;
      }
    },

    async toggleApprove(item) {
      if (!item || !item.url) return;
      const willApprove = !item.approved_at;
      try {
        const res = await fetch("/api/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: item.url, approved: willApprove }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        const stamp = data.approved ? new Date().toISOString() : "";
        const owner = data.approved ? "owner" : "";
        // Actualizar en memoria: la card clickeada + cualquier card que
        // comparta cluster_key (el approve en el server aplica a todo el cluster).
        const cluster = item.cluster_key;
        for (const it of this.items) {
          if (it.url === item.url || (cluster && it.cluster_key === cluster)) {
            it.approved_at = stamp;
            it.approved_by = owner;
          }
        }
        item.approved_at = stamp;
        item.approved_by = owner;
        if (this.selectedItem && this.selectedItem.url === item.url) {
          this.selectedItem.approved_at = stamp;
          this.selectedItem.approved_by = owner;
        }
        this._bumpData();   // approved_at cambió → invalidar pipeline/stats
      } catch (e) {
        alert("Error al aprobar: " + e.message);
      }
    },

    // ====================================================================
    // Selección múltiple + acciones batch (P2)
    // ====================================================================
    toggleSelectMode() {
      this.selectMode = !this.selectMode;
      if (!this.selectMode) this.clearSelection();
    },
    isSelected(key) { return !!this.selected[key]; },
    toggleSelect(key) {
      const next = { ...this.selected };
      if (next[key]) delete next[key]; else next[key] = true;
      this.selected = next;
    },
    get selectionCount() { return Object.keys(this.selected).length; },
    clearSelection() { this.selected = {}; this.batchMoveOpen = false; this.batchMoveSearch = ""; this.batchMoveResults = []; },
    selectAllVisible() {
      const next = { ...this.selected };
      if (this.view === 'edition') {
        for (const it of this.paginated) next['i:' + it.url] = true;
      } else {
        for (const ed of this.paginated) next['e:' + ed.edition_key] = true;
      }
      this.selected = next;
    },
    // Expande la selección a parámetros del API batch/approve:
    // editions enteras → edition_keys; cards solo / tomos sueltos → urls.
    _expandSelection() {
      const item_urls = [], edition_keys = [];
      for (const k of Object.keys(this.selected)) {
        if (k.startsWith('i:')) item_urls.push(k.slice(2));
        else if (k.startsWith('e:')) {
          const ek = k.slice(2);
          if (ek.startsWith('__solo__')) item_urls.push(ek.slice('__solo__'.length));
          else edition_keys.push(ek);
        }
      }
      return { item_urls, edition_keys };
    },
    // Todos los URLs concretos de la selección (expande ediciones a sus tomos).
    _selectedItemUrls() {
      const urls = new Set();
      for (const k of Object.keys(this.selected)) {
        if (k.startsWith('i:')) urls.add(k.slice(2));
        else if (k.startsWith('e:')) {
          const ek = k.slice(2);
          if (ek.startsWith('__solo__')) urls.add(ek.slice('__solo__'.length));
          else for (const it of this.items) if (it.edition_key === ek) urls.add(it.url);
        }
      }
      return [...urls];
    },
    async batchApprove(approved) {
      if (this.batchBusy || this.selectionCount === 0) return;
      this.batchBusy = true; this.batchMsg = "";
      const { item_urls, edition_keys } = this._expandSelection();
      try {
        const res = await fetch('/api/batch/approve', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls: item_urls, edition_keys, approved }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        // Reflejar en memoria sin recargar.
        const stamp = approved ? new Date().toISOString() : "";
        const owner = approved ? "owner" : "";
        const urlSet = new Set(item_urls), ekSet = new Set(edition_keys);
        const clusters = new Set();
        for (const it of this.items) if (urlSet.has(it.url)) clusters.add(it.cluster_key || ('url:' + it.url));
        for (const it of this.items) {
          const cl = it.cluster_key || ('url:' + it.url);
          if (clusters.has(cl) || ekSet.has(it.edition_key)) { it.approved_at = stamp; it.approved_by = owner; }
        }
        this._bumpData();   // approved_at cambió → invalidar pipeline/stats
        this.batchMsg = `${data.count} tomo(s) ${approved ? 'aprobados' : 'desaprobados'}`;
        this.clearSelection();
        setTimeout(() => { this.batchMsg = ""; }, 2500);
      } catch (e) {
        this.batchMsg = "Error: " + e.message;
      } finally { this.batchBusy = false; }
    },
    async searchBatchEditions() {
      const q = (this.batchMoveSearch || "").trim();
      if (q.length < 2) { this.batchMoveResults = []; return; }
      try {
        const res = await fetch("/api/editions/search?q=" + encodeURIComponent(q));
        const data = await res.json();
        this.batchMoveResults = data.results || [];
      } catch { this.batchMoveResults = []; }
    },
    async batchMove(editionKey) {
      if (this.batchBusy || !editionKey) return;
      const urls = this._selectedItemUrls();
      if (!urls.length) return;
      this.batchBusy = true; this.batchMsg = "";
      try {
        const res = await fetch('/api/batch/move', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls, to_edition: editionKey }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        this.batchMsg = `${data.count} item(s) movidos`;
        this.clearSelection();
        await this.loadItems();   // estructura cambió → re-agrupar
        setTimeout(() => { this.batchMsg = ""; }, 2500);
      } catch (e) {
        this.batchMsg = "Error: " + e.message;
      } finally { this.batchBusy = false; }
    },
    async batchReport() {
      if (this.batchBusy || this.selectionCount === 0) return;
      const reason = window.prompt("Motivo del reporte (se aplica a la selección):", "");
      if (reason === null) return;          // cancelado
      const urls = this._selectedItemUrls();
      this.batchBusy = true; this.batchMsg = "";
      let ok = 0;
      try {
        for (const url of urls) {
          const it = this.items.find(i => i.url === url) || {};
          const res = await fetch('/api/feedback', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: it.title || "(sin título)", url, reason: reason || "batch report" }),
          });
          if (res.ok) { ok++; this.reportedUrls = { ...this.reportedUrls, [url]: true }; }
        }
        this.batchMsg = `${ok} item(s) reportados`;
        this.clearSelection();
        setTimeout(() => { this.batchMsg = ""; }, 2500);
      } catch (e) {
        this.batchMsg = "Error: " + e.message;
      } finally { this.batchBusy = false; }
    },

    // ====================================================================
    // Modo curación rápida (P3) — recorre la cola filtrada con el teclado.
    // ====================================================================
    // La cola = items filtrados+ordenados (sorted). Snapshot de URLs al
    // entrar para que aprobar/reportar no reordene la cola bajo los pies.
    startReview() {
      const queue = this.sorted;
      if (!queue.length) return;
      this.reviewUrls = queue.map(i => i.url);
      this.reviewIdx = 0;
      this.reviewReportOpen = false;
      this.reviewReason = "";
      this.reviewMode = true;
      document.body.style.overflow = 'hidden';
    },
    exitReview() {
      this.reviewMode = false;
      this.reviewReportOpen = false;
      document.body.style.overflow = '';
    },
    get reviewItem() {
      const url = this.reviewUrls[this.reviewIdx];
      if (!url) return null;
      return this.items.find(i => i.url === url) || null;
    },
    get reviewTotal() { return this.reviewUrls.length; },
    reviewNext() {
      this.reviewReportOpen = false;
      if (this.reviewIdx < this.reviewUrls.length - 1) this.reviewIdx++;
    },
    reviewPrev() {
      this.reviewReportOpen = false;
      if (this.reviewIdx > 0) this.reviewIdx--;
    },
    _reviewFlash(msg) {
      this.reviewFlash = msg;
      setTimeout(() => { if (this.reviewFlash === msg) this.reviewFlash = ""; }, 1200);
    },
    async reviewApprove() {
      const it = this.reviewItem;
      if (!it || this.reviewBusy) return;
      if (!it.approved_at) { this.reviewBusy = true; await this.toggleApprove(it); this.reviewBusy = false; }
      this._reviewFlash("✓ aprobado");
      this.reviewNext();
    },
    async reviewUnapprove() {
      const it = this.reviewItem;
      if (!it || this.reviewBusy) return;
      if (it.approved_at) { this.reviewBusy = true; await this.toggleApprove(it); this.reviewBusy = false; }
      this._reviewFlash("✗ desaprobado");
    },
    reviewSkip() { this._reviewFlash("→ saltado"); this.reviewNext(); },
    reviewOpenReport() {
      this.reviewReportOpen = true; this.reviewReason = "";
      this.$nextTick(() => { try { this.$refs.reviewReasonInput?.focus(); } catch (e) {} });
    },
    async reviewSubmitReport() {
      const it = this.reviewItem;
      if (!it || this.reviewBusy) return;
      const reason = (this.reviewReason || "").trim();
      if (!reason) return;
      this.reviewBusy = true;
      try {
        const res = await fetch('/api/feedback', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: it.title || "(sin título)", url: it.url, reason }),
        });
        if (res.ok) this.reportedUrls = { ...this.reportedUrls, [it.url]: true };
        this._reviewFlash("⚐ reportado");
      } catch (e) { /* noop */ }
      finally { this.reviewBusy = false; this.reviewReportOpen = false; this.reviewNext(); }
    },
    reviewEdit() {
      const it = this.reviewItem;
      if (!it) return;
      this.exitReview();
      this.openVolume(it);
      this.$nextTick(() => this.startEdit());
    },

    // --- Edición inline de la metadata del item ---
    // Arma el schema editable desde las keys reales del item (menos imágenes),
    // infiriendo el tipo de control por el valor: text / textarea / number /
    // list (lista de escalares, separada por comas) / json (lista de objetos o
    // dict, textarea con JSON).
    buildEditSchema(item) {
      const excluded = new Set(this.EDIT_EXCLUDED);
      const longText = new Set(this.EDIT_TEXTAREA);
      const order = this.EDIT_MAIN_ORDER;
      const keys = [];
      for (const k of order) if (!excluded.has(k)) keys.push(k);          // siempre (aunque falten)
      for (const k of Object.keys(item)) if (!excluded.has(k) && !keys.includes(k)) keys.push(k);
      return keys.map(k => {
        const v = item[k];
        let kind;
        if (Array.isArray(v)) {
          kind = v.every(e => e === null || typeof e !== "object") ? "list" : "json";
        } else if (v !== null && typeof v === "object") {
          kind = "json";
        } else if (typeof v === "number") {
          kind = "number";
        } else if (longText.has(k)) {
          kind = "textarea";
        } else {
          kind = "text";
        }
        const wide = kind === "textarea" || kind === "json" || k === "title" || k === "title_original" || k === "url";
        return { key: k, label: this.EDIT_LABELS[k] || k, kind, wide, advanced: !order.includes(k) };
      });
    },

    get editMainFields() { return this.editSchema.filter(f => !f.advanced); },
    get editAdvancedFields() { return this.editSchema.filter(f => f.advanced); },

    startEdit() {
      if (!this.selectedItem) return;
      const it = this.selectedItem;
      this.editSchema = this.buildEditSchema(it);
      const d = {};
      for (const f of this.editSchema) {
        const v = it[f.key];
        if (f.kind === "list") d[f.key] = (Array.isArray(v) ? v : []).join(", ");
        else if (f.kind === "json") d[f.key] = JSON.stringify(v === undefined ? null : v, null, 2);
        else if (f.kind === "number") d[f.key] = (v === undefined || v === null) ? "" : v;
        else d[f.key] = (v === undefined || v === null) ? "" : v;
      }
      this.editDraft = d;
      this.editInitial = { ...d };
      this.editError = "";
      this.editFlash = false;
      this.editShowAdvanced = false;
      this.curationOpen = false;
      this.lightboxOpen = false; document.body.style.overflow = '';
      this.editMode = true;
      window.scrollTo({ top: 0, behavior: "smooth" });
    },

    cancelEdit() {
      this.editMode = false;
      this.editError = "";
    },

    async saveEdit() {
      if (!this.selectedItem || this.editSaving) return;
      this.editSaving = true;
      this.editError = "";
      // Solo mandamos lo que cambió (no reescribimos campos derivados sin tocar).
      const fields = {};
      const structural = new Set(["url", "slug", "cluster_key", "edition_key",
        "series_key", "volume"]);
      let structuralChanged = false;
      for (const f of this.editSchema) {
        const raw = this.editDraft[f.key];
        if (raw === this.editInitial[f.key]) continue;  // sin cambios
        if (f.kind === "list") {
          fields[f.key] = String(raw).split(",").map(s => s.trim()).filter(Boolean);
        } else if (f.kind === "json") {
          const t = String(raw).trim();
          if (t === "" || t === "null") { fields[f.key] = null; }
          else {
            try { fields[f.key] = JSON.parse(raw); }
            catch (e) { this.editError = `JSON inválido en "${f.label}"`; this.editSaving = false; return; }
          }
        } else if (f.kind === "number") {
          fields[f.key] = (raw === "" || raw === null) ? null : Number(raw);
          if (Number.isNaN(fields[f.key])) { this.editError = `Número inválido en "${f.label}"`; this.editSaving = false; return; }
        } else {
          fields[f.key] = raw;
        }
        if (structural.has(f.key)) structuralChanged = true;
      }
      if (Object.keys(fields).length === 0) {
        this.editMode = false; this.editSaving = false; return;  // nada que guardar
      }
      const url = this.selectedItem.url;
      try {
        const res = await fetch("/api/item/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, fields }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        const applied = data.fields || fields;
        // Reflejar en memoria sin recargar: el item del detalle + cualquier
        // card con el mismo cluster_key (el server propaga los campos de
        // producto a todo el cluster).
        const cluster = this.selectedItem.cluster_key;
        for (const it of this.items) {
          if (it.url === url || (cluster && it.cluster_key === cluster)) {
            Object.assign(it, applied);
          }
        }
        Object.assign(this.selectedItem, applied);
        // Campos editables (title/series/etc.) pueden cambiar el haystack y los
        // filtros → re-indexar + invalidar caches. (Si structuralChanged, el
        // loadItems() de abajo lo rehace; el doble bump es inocuo.)
        this._indexSearch();
        this._bumpData();
        this.editMode = false;
        this.editFlash = true;
        setTimeout(() => { this.editFlash = false; }, 2500);
        // Avisar al Panel de Calidad (otra pestaña) para que re-verifique este
        // ítem y lo saque de la worklist si la edición arregló la alerta.
        try { new BroadcastChannel('manga-quality').postMessage({ url }); } catch (e) {}
        // Si cambió algo estructural (keys/grouping), recargamos el dataset
        // para que el catálogo se re-agrupe correctamente al volver.
        if (structuralChanged) await this.loadItems();
      } catch (e) {
        this.editError = "Error: " + e.message;
      } finally {
        this.editSaving = false;
      }
    },

    openLightbox() {
      if (!this.selectedItem) return;
      this.lightboxOpen = true;
      document.body.style.overflow = 'hidden';
    },
    closeLightbox() {
      this.lightboxOpen = false;
      document.body.style.overflow = '';
    },
    lightboxNext() {
      const n = this.itemImages(this.selectedItem).length;
      if (n > 1) this.modalImageIdx = (this.modalImageIdx + 1) % n;
    },
    lightboxPrev() {
      const n = this.itemImages(this.selectedItem).length;
      if (n > 1) this.modalImageIdx = (this.modalImageIdx - 1 + n) % n;
    },

    goToImageManager(item) {
      if (!item || !item.url) return;
      // Round-trip: guardamos la URL actual (incl. hash #/volume/...) como
      // `return` para que el gestor de imágenes ofrezca "Volver al detalle".
      const ret = window.location.pathname + window.location.search + window.location.hash;
      window.location.href = 'image-manager.html?item=' + encodeURIComponent(item.url)
        + '&return=' + encodeURIComponent(ret);
    },

    isReported(url) {
      return !!(url && this.reportedUrls[url]);
    },

    isEditionReported(ed) {
      if (!ed || !Array.isArray(ed.items)) return false;
      return ed.items.some(it => this.isReported(it.url));
    },

    // submitFeedback removed — unified into submitCuration()

    // --- Paginación ---
    goToPage(n) {
      const clamped = Math.max(1, Math.min(this.totalPages, n));
      if (clamped === this.page) return;
      this.page = clamped;
      this._syncStateToUrl();
      window.scrollTo({ top: 0, behavior: "smooth" });
    },

    get visiblePages() {
      const range = 5;
      const start = Math.max(1, this.page - range);
      const end = Math.min(this.totalPages, this.page + range);
      const out = [];
      for (let i = start; i <= end; i++) out.push(i);
      return out;
    },

    copiedTitle: false,
    async copyTitle() {
      const title = this.selectedItem?.title;
      if (!title) return;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(title);
        } else {
          const ta = document.createElement("textarea");
          ta.value = title;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        this.copiedTitle = true;
        setTimeout(() => { this.copiedTitle = false; }, 1500);
      } catch (e) {
        console.error("No se pudo copiar al portapapeles:", e);
      }
    },

    resetFilters() {
      this.filters = {
        search: "", country: "", publisher: "", language: "",
        productType: "", sourceClass: "", signalTypes: [], rarities: [],
        onlyLimited: false, approval: "all",
      };
      this.page = 1;
      this._syncStateToUrl();
    },

    toggleSignalType(sig) {
      const idx = this.filters.signalTypes.indexOf(sig);
      if (idx >= 0) {
        this.filters.signalTypes.splice(idx, 1);
      } else {
        this.filters.signalTypes.push(sig);
      }
      this.page = 1;
      this._syncStateToUrl();
    },

    toggleRarity(r) {
      const idx = this.filters.rarities.indexOf(r);
      if (idx >= 0) {
        this.filters.rarities.splice(idx, 1);
      } else {
        this.filters.rarities.push(r);
      }
      this.page = 1;
      this._syncStateToUrl();
    },
  };
}

// ESC: en volume → volver a la edición/catálogo; en edition → catálogo.
document.addEventListener("keydown", (e) => {
  const root = document.querySelector("[x-data]");
  // Alpine v3: el acceso oficial al estado es Alpine.$data(root); `root.__x`
  // no existe en este build (rompía Escape + flechas en silencio).
  const d = (root && window.Alpine) ? Alpine.$data(root) : null;
  if (!d) return;
  // Con el lightbox abierto: ←/→ navegan, Esc cierra (sin volver de vista).
  if (d.lightboxOpen) {
    if (e.key === "Escape") { e.preventDefault(); d.closeLightbox(); }
    else if (e.key === "ArrowLeft") { e.preventDefault(); d.lightboxPrev(); }
    else if (e.key === "ArrowRight") { e.preventDefault(); d.lightboxNext(); }
    return;
  }
  // Modo curación rápida: atajos de teclado para revisar la cola sin el mouse.
  // (Si el input de reporte tiene foco, sus propios @keydown lo manejan con
  // .stop, así que este handler no se dispara mientras escribís el motivo.)
  if (d.reviewMode) {
    const k = e.key.toLowerCase();
    if (e.key === "Escape") { e.preventDefault(); if (d.reviewReportOpen) d.reviewReportOpen = false; else d.exitReview(); return; }
    if (k === "a") { e.preventDefault(); d.reviewApprove(); return; }
    if (k === "u") { e.preventDefault(); d.reviewUnapprove(); return; }
    if (k === "r") { e.preventDefault(); d.reviewOpenReport(); return; }
    if (k === "e") { e.preventDefault(); d.reviewEdit(); return; }
    if (k === "s") { e.preventDefault(); d.reviewSkip(); return; }
    if (k === "j" || e.key === "ArrowRight") { e.preventDefault(); d.reviewNext(); return; }
    if (k === "k" || e.key === "ArrowLeft") { e.preventDefault(); d.reviewPrev(); return; }
    return;
  }
  if (e.key === "Escape") {
    if (d.editMode) { d.cancelEdit(); return; }
    if (d.view === 'volume') d.goBack();
    else if (d.view === 'edition') d.goHome();
    return;
  }
  // En el detalle: ←/→ navegan entre tomos de la edición (si no estás
  // escribiendo en un campo).
  if (d.view === 'volume' && (e.key === "ArrowLeft" || e.key === "ArrowRight")) {
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.key === "ArrowLeft") d.volumeNavPrev();
    else d.volumeNavNext();
  }
});
</script>
